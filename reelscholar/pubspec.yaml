name: reelscholar
description: "ReelScholar - Interactive Learning through Short Educational Video Content for CUT Students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # Navigation
  go_router: ^14.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Video Playback
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Networking (Laravel API)
  dio: ^5.7.0

  # Auth & Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Image Loading & Caching
  cached_network_image: ^3.4.1

  # UI & Animations
  shimmer: ^3.0.0
  lottie: ^3.1.3
  page_transition: ^2.1.0

  # File Picker (video upload)
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Stories / Reels bar
  story_view: ^0.15.0

  # Bottom Navigation
  salomon_bottom_bar: ^3.3.2

  # Percent / Progress indicators
  percent_indicator: ^4.2.3

  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # HTTP requests (lightweight alternative)
  http: ^1.2.2

  # WebSocket client (real-time messaging)
  web_socket_channel: ^3.0.1

  # JWT decode (for reading auth tokens)
  jwt_decoder: ^2.0.1

  # Connectivity check
  connectivity_plus: ^6.1.0

  # Toast / Snackbar notifications
  fluttertoast: ^8.2.8

  # Video thumbnail
  video_thumbnail: ^0.5.3

  # Timeago (e.g. "2 hours ago")
  timeago: ^3.7.0

  # Smooth page indicator (for onboarding)
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  